<div class="container">
    <div class="form-card">
        <h1>Good Morning ☀️</h1>
        <p class="subtitle">Please fill in your details</p>

        <form [formGroup]="goodmorningForm">

            <div class="form-group">
                <label for="name">Full Name</label>
                <input 
                    type="text" 
                    id="name" 
                    formControlName="name" 
                    placeholder="Enter your name">

                <span 
                    class="error"
                    *ngIf="goodmorningForm.get('name')?.errors?.['required'] 
                    && goodmorningForm.get('name')?.touched">
                    Name is required
                </span>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input 
                    type="number" 
                    id="phone" 
                    formControlName="phone" 
                    placeholder="Enter your phone number">

                <span 
                    class="error"
                    *ngIf="goodmorningForm.get('phone')?.errors?.['required'] 
                    && goodmorningForm.get('phone')?.touched">
                    Phone Number is required
                </span>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    formControlName="email" 
                    placeholder="Enter your email">

                <span 
                    class="error"
                    *ngIf="goodmorningForm.get('email')?.errors?.['required'] 
                    && goodmorningForm.get('email')?.touched">
                    Email is required
                </span>
            </div>

            <button type="submit" (click)="onSubmit()">
                Submit
            </button>

        </form>
        <div class="success-msg" *ngIf="isSubmitted">
            ✅ Form submitted successfully!
        </div>
        <div class="greeting" *ngIf="goodmorningForm.value.name">
            Hello, Good Morning 
            <span>{{ goodmorningForm.value.name }}</span>
        </div>
    </div>
</div>
